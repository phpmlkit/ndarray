name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            archive_ext: tar.gz
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            archive_ext: tar.gz
          - platform: darwin-x86_64
            runner: macos-15-intel
            archive_ext: tar.gz
          - platform: darwin-arm64
            runner: macos-latest
            archive_ext: tar.gz
          - platform: windows-x64
            runner: windows-latest
            archive_ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build library
        shell: bash
        run: ./scripts/build.sh release

      - name: Install zip (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (!(Get-Command zip -ErrorAction SilentlyContinue)) {
            choco install zip --no-progress -y
          }

      - name: Create distribution package
        shell: bash
        run: ./scripts/package.sh '${{ matrix.platform }}'

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist-${{ matrix.platform }}.${{ matrix.archive_ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Artifacts (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.platform }}
          path: dist-${{ matrix.platform }}.${{ matrix.archive_ext }}
          retention-days: 7
